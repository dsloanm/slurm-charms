name: slurm charms tests
on:
  workflow_call:
    inputs:
      enable_ha:
        description: "Enable High Availability tests"
        type: boolean
        default: false
  pull_request:
    branches:
      - "main"
      - "track/25.11"
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC nightly

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: canonical/hpc-team/.github/workflows/charmed-hpc-ci.yaml@main
    with:
      run-test: false
      setup-commands: &setup_cmds |
        sudo snap install astral-uv --classic --channel latest/stable
        sudo snap install charmcraft --classic --channel latest/stable

  unit-test:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: canonical/hpc-team/.github/actions/setup-just@main
      - run: *setup_cmds
      - run: just unit

  integration-test:
    name: Integration tests (LXD) | ${{ matrix.bases }}
    needs: [ci, unit-test]
    strategy:
      fail-fast: true
      matrix:
        bases: [ubuntu@24.04]
    # xlarge runner used for nightly and HA-enabled tests. Standard ubuntu runner otherwise
    runs-on: ${{ (github.event_name == 'schedule' || inputs.enable_ha) && 'self-hosted-linux-amd64-noble-xlarge' || 'ubuntu-24.04' }}
    steps:
      - name: Remove unnecessary files
        run: |
          # Remove Java SDKs
          sudo rm -rf /usr/lib/jvm

          # Remove Haskell toolchain
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup

          # Remove .NET SDKs
          sudo rm -rf /usr/share/dotnet

          # Remove Swift toolchain
          sudo rm -rf /usr/share/swift

          # Remove unnecessary runner tools
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
      - uses: canonical/hpc-team/.github/actions/setup-just@main
      - run: *setup_cmds
      - uses: charmed-kubernetes/actions-operator@main
        with:
          provider: lxd
          juju-channel: 3.6/stable
      - name: Run tests
        run: |
          declare -a ARGS=()
          # Only run HA tests nightly or if requested
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.enable_ha }}" == "true" ]]; then
            ARGS+=("--run-high-availability")
          fi
          just integration -- --charm-base=${{ matrix.bases }} ${ARGS[*]}
