name: slurmdbd
summary: |
  Slurm DBD accounting daemon.
description: |
  This charm provides slurmdbd and the bindings to other utilities
  that make lifecycle operations a breeze.

  slurmdbd provides a secure enterprise-wide interface to a database for
  SLURM. This is particularly useful for archiving accounting records.

links:
  contact: https://matrix.to/#/#hpc:ubuntu.com
  issues:
    - https://github.com/canonical/slurm-charms/issues
  source:
    - https://github.com/canonical/slurm-charms

requires:
  database:
    interface: mysql_client

provides:
  slurmctld:
    interface: slurmdbd

peers:
  slurmdbd-peer:
    interface: slurmdbd-peer

assumes:
  - juju

type: charm
base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    override-build: |
      # Regenerate lockfile to use vendored subpackages from `slurm-charms`.
      uv lock
      craftctl default
    build-environment:
      - UV_FROZEN: "false"  # Allow lockfile to be updated in `override-build`.

config:
  options:
    slurmdbd-conf-parameters:
      type: string
      default: ""
      description: |
        User supplied Slurmdbd configuration as a multiline string.

        Example usage:
        $ juju config slurmdbd slurmdbd-conf-parameters="$(cat additional.conf)"
